ekf_odom_imu:
  frequency: 30
  sensor_timeout: 0.2
  two_d_mode: true
  publish_tf: true
  publish_acceleration: false

  map_frame: map
  odom_frame: odom
  base_link_frame: base_link
  world_frame: odom

  odom0: /husky_velocity_controller/odom
  odom0_config: [true,  true,  false,
                 false, false, false,
                 true,  true,  false,
                 false, false, false,
                 false, false, false]
  odom0_differential: false
  odom0_relative: false
  odom0_queue_size: 10

  imu0: /imu/data
  imu0_config: [false, false, false,
                true,  true,  true,
                false, false, false,
                true,  true,  true,
                true,  true,  false]
  imu0_differential: false
  imu0_relative: false
  imu0_remove_gravitational_acceleration: true
  imu0_queue_size: 10

  print_diagnostics: false
